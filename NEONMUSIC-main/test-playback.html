<!DOCTYPE html>
<html>
<head>
    <title>Test Video Playback</title>
</head>
<body>
    <h1>Video Playback Test</h1>
    <video id="testVideo" controls width="400">
        <source src="videos/Timeless.mp4" type="video/mp4">
    </video>
    <br><br>
    <button onclick="testPlay()">Test Play</button>
    
    <script>
        function testPlay() {
            const video = document.getElementById('testVideo');
            console.log('Video element:', video);
            console.log('Video src:', video.querySelector('source').src);
            video.play().then(() => {
                console.log('✅ Video playing successfully');
            }).catch(err => {
                console.error('❌ Video play error:', err);
            });
        }
    </script>
</body>
</html>
