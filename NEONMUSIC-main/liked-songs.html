<body>
<!-- Liked Songs Page - Minimal Modern Design -->
<div class="liked-songs-minimal">
    
    <!-- Simple Centered Header -->
    <div class="page-header-center">
        <h1 class="page-title">Lagu yang Disukai</h1>
        <p class="page-subtitle">10 lagu dalam koleksi</p>
    </div>

    <!-- Control Bar - Minimal -->
    <div class="control-bar-minimal">
        <button class="btn-play-simple" id="playAllLiked" title="Putar Semua">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
        </button>
        
        <div class="control-group">
            <select class="sort-dropdown" id="sortLiked">
                <option value="recent">Terbaru</option>
                <option value="oldest">Terlama</option>
                <option value="title">Judul A-Z</option>
                <option value="artist">Artis A-Z</option>
            </select>
            
            <div class="search-minimal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" placeholder="Cari lagu..." id="searchMinimal">
            </div>
        </div>
    </div>

    <!-- Songs List - Clean Modern -->
    <div class="songs-list-modern" id="songsListModern">
        <!-- Content will be dynamically generated by liked-songs-manager.js -->
    </div>
</div>
</body>
