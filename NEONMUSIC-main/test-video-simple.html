<!DOCTYPE html>
<html>
<head>
    <title>Simple Video Test</title>
    <style>
        body {
            background: #000;
            color: #fff;
            padding: 50px;
            font-family: Arial;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .video-box {
            width: 320px;
            height: 320px;
            border: 3px solid #0f0;
            margin: 20px 0;
        }
        
        .video-box.hidden {
            display: none;
        }
        
        .video-box.active {
            display: block;
            border-color: #f00;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        button {
            padding: 15px 30px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }
        
        .status {
            background: #222;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Simple Video Test</h1>
        
        <div class="status" id="status">
            <h3>Status: Waiting...</h3>
            <div id="log"></div>
        </div>
        
        <h2>Test Video Container:</h2>
        <div class="video-box hidden" id="videoBox">
            <video id="video" loop>
                <source id="source" src="" type="video/mp4">
            </video>
        </div>
        
        <button onclick="testVideo()">▶ Load & Play Video</button>
        <button onclick="hideVideo()">⏹ Hide Video</button>
        <button onclick="checkStatus()">🔍 Check Status</button>
    </div>
    
    <script>
        const videoBox = document.getElementById('videoBox');
        const video = document.getElementById('video');
        const source = document.getElementById('source');
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        function addLog(msg, color = '#0f0') {
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div style="color: ${color}; margin: 5px 0;">[${time}] ${msg}</div>`;
            console.log(msg);
        }
        
        function testVideo() {
            addLog('🔵 Starting video test...', '#0ff');
            
            // Set video source
            const videoPath = 'videos/Jamesarthur.mp4';
            addLog(`Setting source: ${videoPath}`);
            source.src = videoPath;
            
            // Load video
            addLog('Loading video...');
            video.load();
            
            // Remove hidden, add active
            addLog('Removing hidden class...');
            videoBox.classList.remove('hidden');
            
            addLog('Adding active class...');
            videoBox.classList.add('active');
            
            // Check computed styles
            const computed = window.getComputedStyle(videoBox);
            addLog(`Computed display: ${computed.display}`, computed.display === 'block' ? '#0f0' : '#f00');
            addLog(`Computed visibility: ${computed.visibility}`);
            addLog(`Box dimensions: ${videoBox.offsetWidth}x${videoBox.offsetHeight}`);
            
            // Try to play
            addLog('Attempting to play...');
            video.play()
                .then(() => {
                    addLog('✅ SUCCESS! Video is playing!', '#0f0');
                    addLog(`Video duration: ${video.duration}s`);
                    addLog(`Video dimensions: ${video.videoWidth}x${video.videoHeight}`);
                })
                .catch(err => {
                    addLog(`❌ ERROR: ${err.message}`, '#f00');
                });
        }
        
        function hideVideo() {
            addLog('Hiding video...', '#ff0');
            videoBox.classList.remove('active');
            videoBox.classList.add('hidden');
            video.pause();
        }
        
        function checkStatus() {
            addLog('📊 Current Status:', '#0ff');
            addLog(`  - Classes: ${videoBox.className}`);
            addLog(`  - Display: ${window.getComputedStyle(videoBox).display}`);
            addLog(`  - Width: ${videoBox.offsetWidth}px`);
            addLog(`  - Height: ${videoBox.offsetHeight}px`);
            addLog(`  - Video paused: ${video.paused}`);
            addLog(`  - Video currentTime: ${video.currentTime}s`);
            addLog(`  - Video readyState: ${video.readyState}`);
        }
        
        // Check on load
        window.addEventListener('load', () => {
            addLog('✅ Page loaded', '#0f0');
            checkStatus();
        });
    </script>
</body>
</html>
